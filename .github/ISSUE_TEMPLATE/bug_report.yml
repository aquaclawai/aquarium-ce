name: Bug Report
description: Report a bug in Aquarium CE
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `npx @aquaclawai/aquarium --version`"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
    validations:
      required: true
